{{define "issue_new.html"}}{{template "header" .}}
<div class="repo-header">
    <h2><a href="/{{.Owner.Username}}">{{.Owner.Username}}</a> / <a href="/{{.Owner.Username}}/{{.Repo.Name}}">{{.Repo.Name}}</a></h2>
</div>

<h3>New Issue</h3>
<form method="POST" action="/{{.Owner.Username}}/{{.Repo.Name}}/issues/new" class="form-card">
    <div class="form-group">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required autofocus placeholder="Issue title">
    </div>
    <div class="form-group">
        <label for="body">Description</label>
        <textarea id="body" name="body" rows="10" placeholder="Describe the issue..."></textarea>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Labels</label>
            {{range .Labels}}
            <label class="checkbox-label">
                <input type="checkbox" name="label_ids" value="{{.ID}}">
                <span class="label" style="background-color:{{.Color}}">{{.Name}}</span>
            </label>
            {{end}}
        </div>
        <div class="form-group">
            <label for="milestone_id">Milestone</label>
            <select id="milestone_id" name="milestone_id">
                <option value="">None</option>
                {{range .Milestones}}
                {{if not .IsClosed}}<option value="{{.ID}}">{{.Title}}</option>{{end}}
                {{end}}
            </select>
        </div>
    </div>
    <button type="submit" class="btn btn-primary">Submit new issue</button>
</form>
{{template "footer" .}}{{end}}
