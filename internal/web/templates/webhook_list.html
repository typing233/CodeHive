{{define "webhook_list.html"}}{{template "header" .}}
<div class="repo-header">
    <h2><a href="/{{.Owner}}">{{.Owner}}</a> / <a href="/{{.Owner}}/{{.RepoName}}">{{.RepoName}}</a> - Webhooks</h2>
</div>

<form method="POST" action="/{{.Owner}}/{{.RepoName}}/settings/webhooks" class="form">
    <div class="form-group">
        <label>Payload URL</label>
        <input type="url" name="url" required class="form-control" placeholder="https://example.com/hook">
    </div>
    <div class="form-group">
        <label>Secret (optional)</label>
        <input type="text" name="secret" class="form-control">
    </div>
    <div class="form-group">
        <label>Events</label>
        <label><input type="checkbox" name="events" value="push" checked> Push</label>
        <label><input type="checkbox" name="events" value="pr.opened"> PR Opened</label>
        <label><input type="checkbox" name="events" value="pr.merged"> PR Merged</label>
        <label><input type="checkbox" name="events" value="pr.closed"> PR Closed</label>
        <label><input type="checkbox" name="events" value="issue.opened"> Issue Opened</label>
        <label><input type="checkbox" name="events" value="issue.closed"> Issue Closed</label>
    </div>
    <button type="submit" class="btn btn-primary">Add Webhook</button>
</form>

{{if .Webhooks}}
<div class="webhook-list">
{{range .Webhooks}}
<div class="webhook-item">
    <a href="/{{$.Owner}}/{{$.RepoName}}/settings/webhooks/{{.ID}}">{{.URL}}</a>
    <span class="{{if .IsActive}}active{{else}}inactive{{end}}">{{if .IsActive}}Active{{else}}Inactive{{end}}</span>
</div>
{{end}}
</div>
{{end}}
{{template "footer" .}}{{end}}
