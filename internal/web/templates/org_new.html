{{define "org_new.html"}}{{template "header" .}}
<h2>Create Organization</h2>
<form method="POST" action="/orgs/new" class="form">
    <div class="form-group">
        <label>Organization Name</label>
        <input type="text" name="name" required pattern="[a-zA-Z0-9_-]+" class="form-control">
    </div>
    <div class="form-group">
        <label>Display Name</label>
        <input type="text" name="display_name" class="form-control">
    </div>
    <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="3" class="form-control"></textarea>
    </div>
    <div class="form-group">
        <label><input type="checkbox" name="is_public" checked> Public organization</label>
    </div>
    <button type="submit" class="btn btn-primary">Create Organization</button>
</form>
{{template "footer" .}}{{end}}
