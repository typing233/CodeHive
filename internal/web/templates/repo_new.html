{{define "repo_new.html"}}{{template "header" .}}
<div class="page-header">
    <h2>Create a new repository</h2>
</div>
{{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
<form method="POST" action="/new" class="form-card">
    <div class="form-group">
        <label for="name">Repository name</label>
        <input type="text" id="name" name="name" required pattern="[a-zA-Z0-9_.-]{1,100}" placeholder="my-project">
        <small>Letters, digits, hyphens, underscores, and dots</small>
    </div>
    <div class="form-group">
        <label for="description">Description (optional)</label>
        <input type="text" id="description" name="description" placeholder="Short description of this repository">
    </div>
    <div class="form-group">
        <label>Visibility</label>
        <div class="radio-group">
            <label><input type="radio" name="visibility" value="public" checked> Public</label>
            <label><input type="radio" name="visibility" value="private"> Private</label>
        </div>
    </div>
    <div class="form-group">
        <label for="default_branch">Default branch</label>
        <input type="text" id="default_branch" name="default_branch" value="main" placeholder="main">
    </div>
    <button type="submit" class="btn btn-primary">Create Repository</button>
</form>
{{template "footer" .}}{{end}}
