{{define "repo_commits.html"}}{{template "header" .}}
<div class="repo-header">
    <h2><a href="/{{.Owner.Username}}">{{.Owner.Username}}</a> / <a href="/{{.Owner.Username}}/{{.Repo.Name}}">{{.Repo.Name}}</a></h2>
</div>
<div class="repo-nav">
    <a href="/{{.Owner.Username}}/{{.Repo.Name}}">Code</a>
    <a href="/{{.Owner.Username}}/{{.Repo.Name}}/commits/{{.Ref}}" class="active">Commits</a>
    <a href="/{{.Owner.Username}}/{{.Repo.Name}}/issues">Issues</a>
</div>

<div class="branch-selector">
    <select onchange="window.location.href='/{{.Owner.Username}}/{{.Repo.Name}}/commits/'+this.value">
        {{range .Branches}}
        <option value="{{.}}" {{if eq . $.Ref}}selected{{end}}>{{.}}</option>
        {{end}}
    </select>
</div>

<div class="commit-list">
    {{range .Commits}}
    <div class="commit-item">
        <div class="commit-info">
            <a href="/{{$.Owner.Username}}/{{$.Repo.Name}}/commit/{{.SHA}}" class="commit-message">{{.Message}}</a>
            <div class="commit-meta">
                <span class="commit-author">{{.Author}}</span>
                <span class="commit-time">{{timeAgo .Timestamp}}</span>
            </div>
        </div>
        <div class="commit-sha">
            <a href="/{{$.Owner.Username}}/{{$.Repo.Name}}/commit/{{.SHA}}"><code>{{shortSHA .SHA}}</code></a>
        </div>
    </div>
    {{end}}
</div>

<div class="pagination">
    {{if gt .Page 1}}<a href="?page={{sub .Page 1}}" class="btn btn-sm">Previous</a>{{end}}
    {{if .HasNext}}<a href="?page={{add .Page 1}}" class="btn btn-sm">Next</a>{{end}}
</div>
{{template "footer" .}}{{end}}
