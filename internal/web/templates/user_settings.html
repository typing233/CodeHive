{{template "base" .}}
{{define "title"}}Settings - CodeHive{{end}}
{{define "content"}}
<h2>Profile Settings</h2>
<div class="settings-nav">
    <a href="/settings" class="active">Profile</a>
    <a href="/settings/keys">SSH Keys</a>
    <a href="/settings/tokens">Access Tokens</a>
</div>

{{if .Error}}<div class="alert alert-error">{{.Error}}</div>{{end}}
{{if .Success}}<div class="alert alert-success">{{.Success}}</div>{{end}}

<form method="POST" action="/settings" class="form-card">
    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" value="{{.User.Username}}" disabled>
        <small>Username cannot be changed</small>
    </div>
    <div class="form-group">
        <label for="full_name">Full Name</label>
        <input type="text" id="full_name" name="full_name" value="{{.User.FullName}}">
    </div>
    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{.User.Email}}" required>
    </div>
    <button type="submit" class="btn btn-primary">Update profile</button>
</form>
{{end}}
